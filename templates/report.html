<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.7;
    color: #2d2d2d;
  }

  /* ── Cover page ── */
  .cover {
    page-break-after: always;
    height: 100vh;
    background: #1a2744;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 70px;
  }
  .cover .label {
    font-size: 9pt;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8fa8d0;
    margin-bottom: 30px;
  }
  .cover h1 {
    font-size: 26pt;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 30px;
  }
  .cover .meta {
    font-size: 10pt;
    color: #a0b8d8;
    margin-top: 10px;
  }
  .cover .price-badge {
    display: inline-block;
    margin-top: 40px;
    background: #2e4a80;
    padding: 8px 18px;
    border-radius: 4px;
    font-size: 10pt;
  }
  .cover .footer-cover {
    position: absolute;
    bottom: 40px;
    left: 70px;
    font-size: 8pt;
    color: #5a7aa8;
  }

  /* ── Body pages ── */
  .content {
    padding: 50px 70px;
  }

  h1, h2, h3, h4 {
    color: #1a2744;
    margin-top: 28px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  h2 { font-size: 15pt; border-bottom: 2px solid #e0e8f5; padding-bottom: 6px; }
  h3 { font-size: 12pt; }

  p { margin-bottom: 12px; }

  a { color: #2e4a80; text-decoration: none; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0;
    font-size: 10pt;
  }
  th {
    background: #1a2744;
    color: white;
    padding: 8px 12px;
    text-align: left;
  }
  td {
    padding: 7px 12px;
    border-bottom: 1px solid #e0e8f5;
  }
  tr:nth-child(even) td { background: #f5f8ff; }

  ul, ol { margin: 10px 0 14px 24px; }
  li { margin-bottom: 5px; }

  blockquote {
    border-left: 4px solid #2e4a80;
    margin: 16px 0;
    padding: 8px 16px;
    background: #f5f8ff;
    color: #3a4a6a;
    font-style: italic;
  }

  code, pre {
    font-family: 'Courier New', monospace;
    background: #f0f4fb;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 9.5pt;
  }

  /* ── Page numbers ── */
  @page {
    size: A4;
    margin: 20mm 18mm 22mm 18mm;
    @bottom-center {
      content: "© JDHP  ·  " string(report-title) "  ·  Page " counter(page);
      font-size: 8pt;
      color: #888;
    }
  }
  @page :first { @bottom-center { content: ""; } }

  .report-title { string-set: report-title content(); display: none; }
</style>
</head>
<body>

<!-- Hidden element for page-footer string -->
<span class="report-title">{{ title }}</span>

<!-- Cover page -->
<div class="cover">
  <div class="label">JDHP Research Report</div>
  <h1>{{ title }}</h1>
  <div class="meta">Published: {{ date }}</div>
  <div class="meta">Prepared for: {{ audience }}</div>
  <div class="price-badge">₹{{ price_inr }}</div>
  <div class="footer-cover">© JDHP Agentic Publishing House · jdhp.in</div>
</div>

<!-- Report body -->
<div class="content">
  {{ body }}
</div>

</body>
</html>
